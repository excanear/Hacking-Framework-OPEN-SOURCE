version: "3.9"

# ─── Shared defaults ──────────────────────────────────────────────────────────
x-app-base: &app-base
  build:
    context: ..
    dockerfile: docker/Dockerfile
  env_file: ../.env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - platform-net

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-security_platform}
      POSTGRES_USER: ${DB_USER:-platform_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-platform_user} -d ${DB_NAME:-security_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - platform-net

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - platform-net

  # ── FastAPI application ───────────────────────────────────────────────────────
  api:
    <<: *app-base
    command: ["uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - reports_output:/app/reports_output
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Celery scan worker ────────────────────────────────────────────────────────
  worker-scan:
    <<: *app-base
    command:
      - celery
      - -A
      - workers.worker_manager.celery_app
      - worker
      - --loglevel=info
      - --queues=scans
      - --concurrency=4
      - --hostname=scan-worker@%h
    volumes:
      - reports_output:/app/reports_output

  # ── Celery analysis worker ────────────────────────────────────────────────────
  worker-analysis:
    <<: *app-base
    command:
      - celery
      - -A
      - workers.worker_manager.celery_app
      - worker
      - --loglevel=info
      - --queues=analysis,default
      - --concurrency=2
      - --hostname=analysis-worker@%h
    volumes:
      - reports_output:/app/reports_output

  # ── Celery Flower monitoring ──────────────────────────────────────────────────
  flower:
    <<: *app-base
    command:
      - celery
      - -A
      - workers.worker_manager.celery_app
      - flower
      - --port=5555
      - --url_prefix=flower
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      - redis

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pg_data:
  redis_data:
  reports_output:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  platform-net:
    driver: bridge
